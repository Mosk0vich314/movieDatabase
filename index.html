<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e94560">
  <meta name="description" content="Track and catalogue all the movies you've watched">
  <title>Movie Catalogue</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/styles.css?v=2026.03.16.2105">
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">Movie Catalogue</h1>
  </header>

  <nav class="app-nav">
    <a href="#catalogue" class="nav-link active" data-view="catalogue">
      <span class="nav-icon">&#9634;</span> Catalogue
    </a>
    <a href="#add" class="nav-link" data-view="add">
      <span class="nav-icon">+</span> Add
    </a>
    <a href="#stats" class="nav-link" data-view="stats">
      <span class="nav-icon">&#9776;</span> Stats
    </a>
    <a href="#settings" class="nav-link" data-view="settings">
      <span class="nav-icon">&#9881;</span> Settings
    </a>
  </nav>

  <main class="app-main">
    <!-- Catalogue View -->
    <section id="view-catalogue" class="view">
      <div class="catalogue-controls">
        <div class="filter-bar">
          <select id="filter-genre" class="filter-select">
            <option value="">All Genres</option>
          </select>
          <select id="filter-director" class="filter-select">
            <option value="">All Directors</option>
          </select>
          <select id="filter-rating" class="filter-select">
            <option value="">All Ratings</option>
            <option value="5">5 Stars</option>
            <option value="4">4+ Stars</option>
            <option value="3">3+ Stars</option>
            <option value="2">2+ Stars</option>
            <option value="1">1+ Stars</option>
          </select>
          <select id="sort-by" class="filter-select">
            <option value="dateAdded-desc">Newest Added</option>
            <option value="dateAdded-asc">Oldest Added</option>
            <option value="title-asc">Title A-Z</option>
            <option value="title-desc">Title Z-A</option>
            <option value="rating-desc">Highest Rated</option>
            <option value="rating-asc">Lowest Rated</option>
            <option value="year-desc">Newest Release</option>
            <option value="year-asc">Oldest Release</option>
            <option value="director-asc">Group by Director</option>
          </select>
        </div>
        <input type="text" id="catalogue-search" class="search-input" placeholder="Search your movies...">
      </div>
      <div id="movie-grid" class="movie-grid"></div>
      <div id="empty-catalogue" class="empty-state" style="display:none;">
        <p>No movies yet! Start by <a href="#add">adding a movie</a>.</p>
      </div>
    </section>

    <!-- Add Movie View -->
    <section id="view-add" class="view" style="display:none;">
      <div class="add-movie-search">
        <input type="text" id="tmdb-search" class="search-input" placeholder="Search for a movie...">
        <button id="tmdb-search-btn" class="btn btn-primary">Search</button>
      </div>
      <div id="search-results" class="search-results"></div>

      <!-- Add/Edit Form (shown after selecting a movie) -->
      <form id="movie-form" class="movie-form" style="display:none;">
        <input type="hidden" id="form-id">
        <input type="hidden" id="form-tmdb-id">
        <div class="form-movie-preview">
          <img id="form-poster" class="form-poster" src="" alt="">
          <div class="form-movie-info">
            <h3 id="form-title"></h3>
            <p id="form-year"></p>
            <p id="form-genres"></p>
            <div id="form-directors" class="form-directors"></div>
          </div>
        </div>
        <div class="form-group">
          <label>Your Rating</label>
          <div class="star-rating" id="star-rating">
            <span class="star" data-value="1">&#9733;</span>
            <span class="star" data-value="2">&#9733;</span>
            <span class="star" data-value="3">&#9733;</span>
            <span class="star" data-value="4">&#9733;</span>
            <span class="star" data-value="5">&#9733;</span>
          </div>
          <input type="hidden" id="form-rating" value="0">
        </div>
        <div class="form-group">
          <label for="form-date-watched">Date Watched</label>
          <input type="date" id="form-date-watched" class="form-input">
        </div>
        <div class="form-group">
          <label for="form-notes">Notes</label>
          <textarea id="form-notes" class="form-input" rows="3" placeholder="Your thoughts on this movie..."></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save Movie</button>
          <button type="button" id="form-cancel" class="btn btn-secondary">Cancel</button>
        </div>
      </form>
    </section>

    <!-- Movie Detail View -->
    <section id="view-detail" class="view" style="display:none;">
      <div id="movie-detail" class="movie-detail"></div>
    </section>

    <!-- Stats View -->
    <section id="view-stats" class="view" style="display:none;">
      <div id="stats-container" class="stats-container"></div>
    </section>

    <!-- Settings View -->
    <section id="view-settings" class="view" style="display:none;">
      <div class="settings-container">
        <h2>Settings</h2>
        <div class="form-group">
          <label for="tmdb-api-key">TMDB API Key</label>
          <p class="form-hint">Get a free key at <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener">themoviedb.org</a></p>
          <input type="text" id="tmdb-api-key" class="form-input" placeholder="Enter your TMDB API key">
          <button id="save-api-key" class="btn btn-primary">Save Key</button>
        </div>
        <hr>
        <h3>Data Management</h3>
        <div class="settings-actions">
          <button id="export-data" class="btn btn-secondary">Export Data (JSON)</button>
          <button id="import-data" class="btn btn-secondary">Import Data</button>
          <input type="file" id="import-file" accept=".json" style="display:none;">
        </div>
      </div>
    </section>
  </main>

  <!-- Toast notification -->
  <div id="toast" class="toast"></div>

  <script src="js/db.js?v=2026.03.16.2105"></script>
  <script src="js/api.js?v=2026.03.16.2105"></script>
  <script src="js/ui.js?v=2026.03.16.2105"></script>
  <script src="js/stats.js?v=2026.03.16.2105"></script>
  <script src="js/app.js?v=2026.03.16.2105"></script>
</body>
</html>
